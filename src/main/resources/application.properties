spring.application.name=PowerTrack-Backend

# MySQL (Docker)
spring.datasource.url=jdbc:mysql://localhost:3306/powertrack_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# data.sql se ejecuta DESPUES de que Hibernate crea las tablas
#spring.jpa.defer-datasource-initialization=true
#spring.sql.init.mode=always


# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.ignore-migration-patterns=*:missing

# Hibernate NO crea tablas, Flyway lo gestiona todo
spring.jpa.hibernate.ddl-auto=none

# Swagger
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

server.port=8080
spring.main.allow-bean-definition-overriding=true

# Email (MailHog para desarrollo)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

