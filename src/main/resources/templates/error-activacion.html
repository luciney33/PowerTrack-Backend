<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error de activación - PowerTrack</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #ffffff; border-radius: 12px; padding: 50px 40px; text-align: center; max-width: 450px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .icon { font-size: 60px; }
        h1 { color: #1a1a2e; margin: 20px 0 10px; }
        p { color: #555555; line-height: 1.6; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">❌</div>
    <h1>Error de activación</h1>
    <p>El código de activación no es válido o ha expirado.</p>
    <p>Si crees que es un error, vuelve a registrarte desde la aplicación.</p>
</div>
</body>
</html>
