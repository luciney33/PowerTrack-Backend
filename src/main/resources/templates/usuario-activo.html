<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuenta activada - PowerTrack</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #ffffff; border-radius: 12px; padding: 50px 40px; text-align: center; max-width: 450px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .icon { font-size: 60px; }
        h1 { color: #1a1a2e; margin: 20px 0 10px; }
        p { color: #555555; line-height: 1.6; }
        .name { color: #e94560; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">✅</div>
    <h1>¡Cuenta activada!</h1>
    <p>Bienvenido/a a PowerTrack, <span class="name" th:text="${nombreUsuario}">Usuario</span>.</p>
    <p>Ya puedes iniciar sesión desde la aplicación y comenzar a registrar tus entrenamientos.</p>
</div>
</body>
</html>
