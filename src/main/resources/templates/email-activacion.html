<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Activa tu cuenta - PowerTrack</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background-color: #1a1a2e; padding: 30px; text-align: center; }
        .header h1 { color: #e94560; margin: 0; font-size: 28px; }
        .body { padding: 30px; color: #333333; }
        .body p { line-height: 1.6; }
        .code-box { background-color: #f0f0f0; border-left: 4px solid #e94560; padding: 15px 20px; margin: 20px 0; font-size: 22px; font-weight: bold; letter-spacing: 4px;
            text-align: center; color: #1a1a2e; border-radius: 4px; }
        .footer { background-color: #f4f4f4; padding: 20px; text-align: center; font-size: 12px; color: #999999; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>PowerTrack</h1>
    </div>
    <div class="body">
        <p>Hola, <strong th:text="${nombreUsuario}">Usuario</strong>.</p>
        <p>Gracias por registrarte en <strong>PowerTrack</strong>. Para activar tu cuenta introduce el siguiente código en la aplicación:</p>
        <div class="code-box" th:text="${codigoActivacion}">000000</div>
        <p>Si no has creado ninguna cuenta, ignora este mensaje.</p>
    </div>
    <div class="footer">
        <p>&copy; 2026 PowerTrack. Todos los derechos reservados.</p>
    </div>
</div>
</body>
</html>
